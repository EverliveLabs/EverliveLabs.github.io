<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Optimal Desktop - Everlive Labs</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .download-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 24px 80px;
            text-align: center;
        }

        .download-container h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .download-container p {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .download-button {
            background-color: var(--accent-color);
            color: white;
            padding: 16px 40px;
            border-radius: 980px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            margin-top: 20px;
        }

        .download-button:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        .pricing-link {
            color: var(--accent-color);
            text-decoration: none;
        }

        .pricing-link:hover {

<body>
    <site-header></site-header>

    <div class="download-container">
        <img src="assets/app-icon.png" alt="Optimal Desktop Icon" class="app-icon" style="width: 96px; height: 96px;">

        <p style="font-size: 16px; margin-top: -20px; margin-bottom: 30px; font-style: italic;"><a href="pricing.html"

        <a href="#" class="download-button">Download for macOS</a>

    </div>

    <site-footer></site-footer>
    <script src="components.js"></script>

</html>
